# ─── Database ───────────────────────────────────────────────────────────────
# Render sets SPRING_DATASOURCE_URL / USERNAME / PASSWORD as env vars automatically.
# For local development, override these in application-local.properties or export them.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/codeb_ims}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Pa$$word33}

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
# update = create tables if not exist, update schema on changes (safe for dev/small prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Let Hibernate auto-detect the dialect (works for both MySQL and PostgreSQL)
spring.jpa.properties.hibernate.dialect=
spring.jpa.database-platform=

# ─── Server ─────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── JWT ────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:codeb-ims-super-secret-jwt-key-2024-must-be-at-least-32-chars}
jwt.expiration=86400000

# ─── Mail (disable autoconfiguration if not used) ───────────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
